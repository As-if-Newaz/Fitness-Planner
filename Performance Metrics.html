<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Fitness Planner - Performance Metrics</title>
    <link rel="stylesheet" href="css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <header class="header">
      <div class="logo-container">
        <img
          src="images/Logo.png"
          alt="Fitness Planner Logo"
          class="logo-icon"
        />
        <span class="logo-text">AI FITNESS PLANNER</span>
      </div>
      <a href="Plan Builder.html" class="back-btn">
        <i class="fas fa-arrow-left"></i> NEW PLAN
      </a>
    </header>

    <main class="container">
      <div class="performance-summary">
        <div class="performance-icon">
          <i class="fas fa-chart-line"></i>
        </div>
        <h1 class="performance-title">Loading your plan...</h1>

        <div class="metrics-grid"></div>
      </div>

      <div class="tips-container"></div>
    </main>

    <script src="js/config.js"></script>
    <script src="js/sample-data.js"></script>
    <script src="js/script.js"></script>
  </body>
</html>
